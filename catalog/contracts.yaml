# Contracts are declared promises about specific (node, consumer)
# pairs. The planner emits new contracts when a metric_request
# specifies a consumer, and annotates plans with which existing
# contracts are preserved / broken / newly required.
#
# Contracts are HARD constraints — they are never silently retired.
# A plan that breaks a contract must declare so explicitly and is
# down-ranked accordingly.

contracts:
  - id: C1
    name: schema_stability
    statement: >
      A specified set of columns must continue to exist on the
      contracted node, with consumer-readable types.
    terms_shape: {columns: [<column_name>, ...]}

  - id: C2
    name: grain_stability
    statement: >
      The contracted node's grain entity must not change. Coarsening
      or refining the grain breaks the consumer's row-level
      assumptions.
    terms_shape: {grain_entity: <name>}

  - id: C3
    name: structural_existence
    statement: >
      The contracted node must continue to exist. The planner cannot
      drop a node carrying a C3 contract.
    terms_shape: {}

tiers:
  - id: critical
    statement: Breaking is a production incident.
  - id: standard
    statement: Breaking is a bug.
  - id: best_effort
    statement: Breaking is flagged but does not block the plan.

# C1, C2, C3 are the stable contract types. Additional types are
# deferred until a fixture demands them.
