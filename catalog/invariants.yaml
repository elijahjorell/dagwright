# Vendored from dag-simulator. Structural correctness conditions on
# the DAG. The planner annotates each emitted plan with which
# invariants hold after the plan applies.
#
# Two classes:
#   structural  — enforced by the data structure; cannot be violated
#                 in a properly-implemented core (e.g. I1 acyclicity).
#   operational — enforced by per-operation guards in dag-simulator;
#                 dagwright treats all of them as required for any
#                 plan it emits.

invariants:
  - id: I1
    name: acyclicity
    class: structural
    statement: >
      The DAG is acyclic. No node may transitively depend on itself.

  - id: I2
    name: grain_reachability
    class: operational
    statement: >
      A child node's grain must be reachable from at least one
      parent's grain via a morphism (preserve, coarsen, refine).
      Otherwise the child's SQL references columns that don't exist.
    references: [grain_morphisms.yaml]

  - id: I3
    name: column_reference_validity
    class: operational
    statement: >
      Every column referenced in a node's lineage must exist on a
      parent's schema.

  - id: I4
    name: source_grounding
    class: operational
    statement: >
      Every non-source node must transitively trace back to at least
      one source.

  - id: I5
    name: layer_ordering
    class: operational
    statement: >
      Every edge must satisfy the edge_transitions matrix in
      layers.yaml. Detected at edge addition AND when a node's layer
      is modified.
    references: [layers.yaml]

  - id: I6
    name: staging_grounded
    class: operational
    statement: >
      Every staging node has at least one direct source parent.
      Strengthens I4 by guarding source removal. Implies I4.

  - id: E2
    name: cardinality_grain_consistency
    class: operational
    statement: >
      An edge's cardinality must agree with the grain morphism it
      implements (preserve = 1:1, coarsen = N:1, refine = 1:N).

  - id: E3
    name: transform_layer_validity
    class: operational
    statement: >
      An edge's transform_type must be valid for its
      (parent_layer, child_layer) pair.

# Violation ownership (dag-simulator F-series findings):
#   I1 / I2 / I3 / I4 / I6 / contracts → owned by node
#   I5 / E2 / E3                       → owned by edge
#
