# Three valid ways a child node's grain can derive from at least one
# of its parents' grains. Used by I2 to determine whether a proposed
# grain is reachable.
#
# A child with multiple parents must reach its grain from at least
# one parent. If reachable from none, the grain is conflicted (I2
# violation) and the plan is invalid.

morphisms:
  - id: preserve
    statement: child_grain_keys == parent_grain_keys
    sql_pattern: same-key join, column transform, no aggregation
    cardinality: one_to_one

  - id: coarsen
    statement: child_grain_keys ⊂ parent_grain_keys
    sql_pattern: GROUP BY a strict subset of parent grain
    cardinality: many_to_one

  - id: refine
    statement: parent_grain_keys ⊂ child_grain_keys
    sql_pattern: fan-out join introducing additional grain keys
    cardinality: one_to_many

