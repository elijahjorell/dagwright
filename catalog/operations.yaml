# The planner emits plans as ordered sequences of these operations.
# v0 includes the 6 atomic operations plus the contract operations
# the planner needs to declare new C1/C2/C3 promises.
#
# Compound operations (e.g. source migration, decommission cascade,
# schema change, new mart) decompose into atomics. Add a compound
# when a fixture's plan reads more clearly with it than with the
# equivalent atomic sequence.

atomics:
  - id: add_node
    args: [name, layer, grain, schema, materialization]
    description: Create a new node in the DAG.

  - id: drop_node
    args: [name]
    description: >
      Remove a node. DPO-style — requires no incident edges (caller
      must drop edges first, or the operation is blocked).

  - id: add_edge
    args: [parent, child, transform_type, column_lineage, cardinality]
    description: Add a parent-child edge with relationship properties.

  - id: drop_edge
    args: [parent, child]
    description: Remove an edge.

  - id: modify_node
    args: [name, properties]
    description: >
      Change a node's layer, grain, schema, or materialization.
      Properties is a map of fields to change.

  - id: modify_edge
    args: [parent, child, properties]
    description: >
      Change an edge's transform_type, column_lineage, or
      cardinality.

# Plan-level operations beyond the structural atomics, needed for
# annotated plans (the planner emits these alongside the structural
# atomics):

contract_operations:
  - id: add_contract
    args: [node, consumer, contract_id, terms, tier]
    description: >
      Declare a new contract (C1, C2, or C3) on a (node, consumer)
      pair. Emitted automatically when a metric_request supplies a
      consumer.

  - id: drop_contract
    args: [node, consumer, contract_id]
    description: >
      Remove a contract. Never emitted by the planner without an
      explicit retire-contract instruction in the spec; reserved for
      future deprecation/definitional_change types.

  - id: update_consumer
    args: [artifact, from_read, to_read]
    description: >
      Re-point a BI consumer's read from one source to another. Each
      of `from_read` and `to_read` is a {node, column} or {node, expr}
      pair. Emitted when a definitional_change requires a must_migrate
      consumer's read to be moved without changing the upstream model
      (the consumer-only plan shape), or alongside an `add_node` /
      modify when the consumer follows the new definition to a new
      column.
